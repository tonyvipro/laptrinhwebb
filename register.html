
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Ký - Lập trình web 2</title>
    <style>
        /* --- CSS DÙNG CHUNG --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 30px;
        }

        .browser-mockup {
            width: 80%;
            max-width: 900px;
            background-color: #fff;
            border: 1px solid #999;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 1px solid #000;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }

        header a {
            text-decoration: none;
            color: #000;
            margin: 0 5px;
        }

        /* --- PHẦN FORM ĐĂNG KÝ --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .register-container {
            border: 1px solid #444;
            padding: 30px 40px;
            width: 500px;
        }

        .register-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-row label {
            width: 120px; /* Độ rộng nhãn lớn hơn một chút để chứa chữ "Nhập lại mật khẩu" */
            font-size: 14px;
        }

        .form-row input {
            flex: 1;
            padding: 6px;
            border: 1px solid #777;
            outline: none;
        }

        .form-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .login-link {
            font-size: 13px;
            color: #0066cc;
            text-decoration: none;
        }

        .btn-submit {
            background-color: #0056b3;
            color: white;
            border: 1px solid #004494;
            padding: 8px 25px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-submit:hover {
            background-color: #004494;
        }

        /* --- FOOTER --- */
        footer {
            border-top: 1px solid #000;
            padding: 10px;
            text-align: center;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="browser-mockup">
        <header>
            <nav>
                <a href="login.html">Home</a> | 
                <a href="login.html">Đăng nhập</a> | 
                <a href="#"><strong>Đăng ký</strong></a>
            </nav>
        </header>

        <main>
            <div class="register-container">
                <h2>Màn hình đăng ký</h2>
                
                <form id="registerForm">
                    <div class="form-row">
                        <label for="username">Username</label>
                        <input type="text" id="username" required>
                    </div>

                    <div class="form-row">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" required>
                    </div>

                    <div class="form-row">
                        <label for="re-password">Nhập lại mật khẩu</label>
                        <input type="password" id="re-password" required>
                    </div>

                    <div class="form-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-footer">
                        <a href="login.html" class="login-link">Đã có tài khoản</a>
                        <button type="submit" class="btn-submit">Đăng ký</button>
                    </div>
                </form>
            </div>
        </main>

        <footer>
            Lập trình web @01/2024
        </footer>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const pass = document.getElementById('password').value;
            const rePass = document.getElementById('re-password').value;

            // Kiểm tra mật khẩu khớp nhau
            if (pass !== rePass) {
                alert("Mật khẩu nhập lại không khớp! Vui lòng kiểm tra.");
                return;
            }

            alert("Đăng ký thành công! Bạn có thể đăng nhập ngay bây giờ.");
            // Ở đây bạn có thể dùng window.location.href = 'login.html'; để chuyển trang
        });
    </script>

</body>
</html>
