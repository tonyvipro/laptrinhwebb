<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cập nhật</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <nav>
                <a href="#">Home</a> | 
                <a href="login.html">Đăng nhập</a> | 
                <a href="register.html">Đăng ký</a>
            </nav>
        </header>

        <main class="login-box">
            <h2>Màn hình cập nhật</h2>
            
            <form action="#" method="POST">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" value="xxxx">
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" value="xxxx">
                </div>

                <div class="input-group">
                    <label for="re-password">Nhập lại mật khẩu</label>
                    <input type="password" id="re-password" name="re-password" value="xxxx">
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="xxxx">
                </div>

                <div class="actions">
                    <a href="login.html" class="forgot-pwd">Đã có tài khoản</a>
                    <button type="submit" class="btn-login">Đăng ký</button>
                </div>
            </form>
        </main>

        <footer>
            Lập trình web @01/2024
        </footer>
    </div>

</body>
</html>
