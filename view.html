<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết người dùng - Lập trình web 2</title>
    <style>
        /* --- CSS DÙNG CHUNG --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 30px;
        }

        .browser-mockup {
            width: 80%;
            max-width: 900px;
            background-color: #fff;
            border: 1px solid #999;
            min-height: 550px;
            display: flex;
            flex-direction: column;
        }

        header {
            border-bottom: 1px solid #000;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }

        header a {
            text-decoration: none;
            color: #000;
            margin: 0 5px;
        }

        /* --- PHẦN NỘI DUNG CHI TIẾT --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .view-container {
            border: 1px solid #444;
            padding: 40px;
            width: 450px;
            background-color: #fff;
        }

        .view-container h2 {
            text-align: center;
            margin-bottom: 35px;
            font-weight: 500;
        }

        .info-row {
            display: flex;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .info-label {
            width: 120px;
            font-weight: normal;
        }

        .info-value {
            flex: 1;
            font-weight: bold; /* Làm nổi bật dữ liệu người dùng */
        }

        .form-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn-edit {
            background-color: #0056b3;
            color: white;
            border: 1px solid #004494;
            padding: 8px 20px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-edit:hover {
            background-color: #004494;
        }

        /* --- FOOTER --- */
        footer {
            border-top: 1px solid #000;
            padding: 10px;
            text-align: center;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="browser-mockup">
        <header>
            <nav>
                <a href="list.html">Home</a> | 
                <a href="login.html">Đăng xuất</a>
            </nav>
        </header>

        <main>
            <div class="view-container">
                <h2>Màn hình chi tiết</h2>
                
                <div class="info-row">
                    <div class="info-label">Username</div>
                    <div class="info-value">test1</div>
                </div>

                <div class="info-row">
                    <div class="info-label">Email</div>
                    <div class="info-value">test1@gmail.com</div>
                </div>

                <div class="form-footer">
                    <a href="update.html" class="btn-edit">Chỉnh sửa</a>
                </div>
            </div>
        </main>

        <footer>
            Lập trình web @01/2024
        </footer>
    </div>

</body>
</html>
